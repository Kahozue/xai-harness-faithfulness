   <g id="text_1">
    <text style="font-weight: 700; font-size: 13px; font-family: 'Helvetica', 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #1a1a1a" x="7.2" y="18.8424" transform="rotate(-0 7.2 18.8424)">From attribution to action</text>
   </g>
   <g id="text_2">
    <text style="font-size: 9px; font-family: 'Helvetica', 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #5a6573" x="7.2" y="37.47024" transform="rotate(-0 7.2 37.47024)">Each XAI finding maps to a concrete prompt / tool-surface governance action.</text>
   </g>
   <g id="text_3">
    <text style="font-size: 8.6px; font-family: 'Helvetica', 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #8794a3" x="17.4672" y="56.09808" transform="rotate(-0 17.4672 56.09808)">Finding (XAI evidence)</text>
   </g>
   <g id="text_4">
    <text style="font-size: 8.6px; font-family: 'Helvetica', 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #8794a3" x="294.6816" y="56.09808" transform="rotate(-0 294.6816 56.09808)">Governance action</text>
   </g>
   <g id="text_5">
    <text style="font-size: 9px; font-family: 'Helvetica', 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #1a1a1a" x="25.1676" y="82.16902" transform="rotate(-0 25.1676 82.16902)">Tool path diverges even when success is</text>
   </g>
   <g id="text_6">
    <text style="font-size: 9px; font-family: 'Helvetica', 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #1a1a1a" x="25.1676" y="95.371502" transform="rotate(-0 25.1676 95.371502)">unchanged</text>
   </g>
   <g id="text_7">
    <text style="font-size: 9px; font-family: 'Helvetica', 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #1a1a1a" x="302.382" y="82.16902" transform="rotate(-0 302.382 82.16902)">Show evidence path, not only pass/fail</text>
   </g>
   <g id="text_8">
    <text style="font-size: 9px; font-family: 'Helvetica', 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #1a1a1a" x="302.382" y="95.371502" transform="rotate(-0 302.382 95.371502)">status.</text>
   </g>
   <g id="text_9">
    <text style="font-size: 9px; font-family: 'Helvetica', 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #1a1a1a" x="25.1676" y="125.2459" transform="rotate(-0 25.1676 125.2459)">First-tool strategies differ by harness</text>
   </g>
   <g id="text_10">
    <text style="font-size: 9px; font-family: 'Helvetica', 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #1a1a1a" x="302.382" y="125.2459" transform="rotate(-0 302.382 125.2459)">Expose or standardize initial</text>
   </g>
   <g id="text_11">
    <text style="font-size: 9px; font-family: 'Helvetica', 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #1a1a1a" x="302.382" y="138.448382" transform="rotate(-0 302.382 138.448382)">discovery affordances.</text>
   </g>
   <g id="text_12">
    <text style="font-size: 9px; font-family: 'Helvetica', 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #1a1a1a" x="25.1676" y="168.32278" transform="rotate(-0 25.1676 168.32278)">Benchmark failures cluster by category</text>
   </g>
   <g id="text_13">
    <text style="font-size: 9px; font-family: 'Helvetica', 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #1a1a1a" x="302.382" y="168.32278" transform="rotate(-0 302.382 168.32278)">Separate high-risk task classes;</text>
   </g>
   <g id="text_14">
    <text style="font-size: 9px; font-family: 'Helvetica', 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #1a1a1a" x="302.382" y="181.525261" transform="rotate(-0 302.382 181.525261)">require replay inspection.</text>
   </g>
   <g id="text_15">
    <text style="font-size: 9px; font-family: 'Helvetica', 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #1a1a1a" x="25.1676" y="211.39966" transform="rotate(-0 25.1676 211.39966)">M1–M4 agreement is partial (10/20)</text>
   </g>
   <g id="text_16">
    <text style="font-size: 9px; font-family: 'Helvetica', 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #1a1a1a" x="302.382" y="211.39966" transform="rotate(-0 302.382 211.39966)">Carry confidence labels and caveats on</text>
   </g>
   <g id="text_17">
    <text style="font-size: 9px; font-family: 'Helvetica', 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #1a1a1a" x="302.382" y="224.602142" transform="rotate(-0 302.382 224.602142)">agent cards.</text>
   </g>
