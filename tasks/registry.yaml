    provenance: "controlled, authored 2026-06-04"

  - id: addlog-t2-04
    category: add_logging
    tier: 2
    source: controlled
    repo_baseline: tasks/target_repo
    prompt: |
      請在 calckit/stats.py 的 median 內加入 logging：以 logger.debug 記錄輸入序列長度
