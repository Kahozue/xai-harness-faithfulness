    provenance: "controlled, authored 2026-06-04"

  - id: addlog-t2-05
    category: add_logging
    tier: 2
    source: controlled
    repo_baseline: tasks/target_repo
    prompt: |
      請在 calckit/money.py 的 parse_amount 加入失敗路徑 logging：當輸入無法解析時，
